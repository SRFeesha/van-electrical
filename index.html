<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive electrical schema of a campervan. Machine-readable data at /schema.json." />
    <!-- Discovery hints for AI agents and other tools that fetch this URL without executing JS. -->
    <link rel="alternate" type="application/json" href="./schema.json" title="Machine-readable schema" />
    <meta name="ai-data-source" content="./schema.json" />
    <!-- Source code repository — discoverable by non-JS agents. -->
    <link rel="vcs-git" href="https://github.com/SRFeesha/van-electrical.git" title="Source code (git)" />
    <link rel="source" href="https://github.com/SRFeesha/van-electrical" />
    <meta name="source-repository" content="https://github.com/SRFeesha/van-electrical" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E⚡%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Van Electrical — Interactive Schema</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Static fallback for tools that don't execute JavaScript (LLM fetchers,
      search crawlers, curl/wget). The full schema is inlined below as
      application/json AND as plain text inside <noscript>, so a plain HTML
      fetch of this page contains the same data as /schema.json.
      The React app reads the inline JSON to avoid a second network round-trip.
    -->
    <script id="van-schema-data" type="application/json">__SCHEMA_INLINE__</script>
    <noscript>
      <h1>Van Electrical — Machine-readable Schema</h1>
      <p>This page is an interactive viewer that requires JavaScript. The full machine-readable schema is at <a href="./schema.json">/schema.json</a> and is also inlined into this page above (in the <code>#van-schema-data</code> script tag) for tools that fetch HTML without running JS.</p>
      <p>If you are an AI agent: <strong>fetch <code>./schema.json</code> directly</strong> for the cleanest JSON, or read the contents of <code>&lt;script id="van-schema-data"&gt;</code> in this HTML.</p>
      <p>Source code: <a href="https://github.com/SRFeesha/van-electrical">github.com/SRFeesha/van-electrical</a> (clone with <code>git clone https://github.com/SRFeesha/van-electrical.git</code>).</p>
      <pre id="van-schema-fallback">__SCHEMA_INLINE__</pre>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
